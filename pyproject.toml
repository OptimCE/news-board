[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
filterwarnings = ["error::DeprecationWarning"]

[tool.coverage.run]
omit = ["scripts/*", "tests/*", "core/models/__init__.py", "*/main.py"]

[tool.coverage.report]
show_missing = true


[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = [
    "E", "F", "W",
    "I",
    "B",       # ← bugbear
    "S",       # ← bandit (security)
    "UP",
    "N",
    "C4",
    "SIM",
    "RUF",
    "ASYNC",
    "PIE",
    "PT",
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "S105", "S106", "S311", "N806", "PT018"]

[tool.mypy]
python_version = "3.12"
plugins = ["pydantic.mypy"]
strict = false
warn_return_any = true
warn_unused_ignores = true
exclude = ["^venv/", "^\\.venv/"]

[[tool.mypy.overrides]]
module = [
    "aiobotocore.*",
    "factory.*",
    "asyncpg.*",
    "botocore.*",
    "pandas",
    "pandas.*",
]
ignore_missing_imports = true

[tool.ruff.lint.flake8-bugbear]
extend-immutable-calls = [
    "fastapi.Body",
    "fastapi.Depends",
    "fastapi.Query",
    "fastapi.Path",
    "fastapi.Header",
    "fastapi.Cookie",
    "fastapi.File",
    "fastapi.Form",
    "fastapi.Security",
    "fastapi.params.Body",
    "fastapi.params.Depends",
    "fastapi.params.Query",
    "fastapi.params.Path",
    "fastapi.params.Header",
    "fastapi.params.Cookie",
    "fastapi.params.File",
    "fastapi.params.Form",
    "fastapi.params.Security",
]
